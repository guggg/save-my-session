<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="SFMono-Regular, Menlo, monospace" font-size="12">
  <defs>
    <style>
      .bg { fill: #0f0f1a; }
      .panel-c { fill: #1e1e2e; stroke: #D97757; stroke-width: 2; }
      .panel-g { fill: #1e1e2e; stroke: #5A8DF4; stroke-width: 2; }
      .title-c { fill: #D97757; }
      .title-g { fill: #5A8DF4; }
      .bar { fill: #313244; }
      .dot-r { fill: #f38ba8; }
      .dot-y { fill: #f9e2af; }
      .dot-g { fill: #a6e3a1; }
      .prompt { fill: #89b4fa; }
      .cmd { fill: #cdd6f4; }
      .muted { fill: #6c7086; }
      .good { fill: #a6e3a1; }
      .warn { fill: #f9e2af; }
      .err { fill: #f38ba8; }
      .user-msg { fill: #b4befe; }
      .asst-msg { fill: #cdd6f4; }

      /* lego common */
      .lego-skin { fill: #F4D8C8; }
      .lego-hair-c { fill: #4A3728; }
      .lego-hair-g { fill: #2A3A5A; }
      .lego-body-c { fill: #D97757; }
      .lego-body-g { fill: #5A8DF4; }
      .lego-legs { fill: #3F3F56; }
      .lego-face { fill: #2D1B17; stroke: #2D1B17; stroke-width: 1.2; stroke-linecap: round; }
      .lego-stud { fill-opacity: 0.35; fill: #000; }

      /* flow packet */
      .packet { fill: #f9e2af; }
    </style>

    <!-- Lego minifigure, left-facing Claude -->
    <g id="lego-claude">
      <!-- legs -->
      <rect x="-11" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="1" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <!-- hips -->
      <rect x="-12" y="26" width="24" height="6" rx="1" class="lego-legs"/>
      <!-- torso trapezoid -->
      <path d="M -10 -6 L 10 -6 L 13 26 L -13 26 Z" class="lego-body-c"/>
      <!-- neck -->
      <rect x="-3" y="-10" width="6" height="4" class="lego-skin"/>
      <!-- head -->
      <rect x="-9" y="-28" width="18" height="20" rx="4" class="lego-skin"/>
      <!-- stud on head -->
      <ellipse cx="0" cy="-29" rx="4" ry="1.5" class="lego-stud"/>
      <!-- hair -->
      <path d="M -10 -22 Q 0 -32 10 -22 L 10 -27 Q 0 -34 -10 -27 Z" class="lego-hair-c"/>
      <!-- eyes + smile -->
      <circle cx="-4" cy="-18" r="1.3" class="lego-face"/>
      <circle cx="4" cy="-18" r="1.3" class="lego-face"/>
      <path d="M -3 -13 Q 0 -11 3 -13" fill="none" class="lego-face"/>
      <!-- left arm -->
      <rect x="-17" y="-4" width="7" height="22" rx="3" class="lego-body-c"/>
      <!-- right arm (animated wave via parent) -->
      <g id="claude-right-arm">
        <rect x="10" y="-4" width="7" height="22" rx="3" class="lego-body-c"/>
        <!-- hand -->
        <circle cx="13.5" cy="19" r="3.5" class="lego-skin"/>
      </g>
      <!-- left hand -->
      <circle cx="-13.5" cy="19" r="3.5" class="lego-skin"/>
    </g>

    <!-- Lego minifigure, Gemini -->
    <g id="lego-gemini">
      <rect x="-11" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="1" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="-12" y="26" width="24" height="6" rx="1" class="lego-legs"/>
      <path d="M -10 -6 L 10 -6 L 13 26 L -13 26 Z" class="lego-body-g"/>
      <rect x="-3" y="-10" width="6" height="4" class="lego-skin"/>
      <rect x="-9" y="-28" width="18" height="20" rx="4" class="lego-skin"/>
      <ellipse cx="0" cy="-29" rx="4" ry="1.5" class="lego-stud"/>
      <!-- hair (different cut) -->
      <path d="M -10 -22 Q 0 -30 10 -22 L 10 -27 Q 0 -33 -10 -27 Z" class="lego-hair-g"/>
      <!-- little antenna to differentiate -->
      <line x1="0" y1="-28" x2="0" y2="-34" stroke="#5A8DF4" stroke-width="1.5"/>
      <circle cx="0" cy="-35" r="2" fill="#f9e2af"/>
      <circle cx="-4" cy="-18" r="1.3" class="lego-face"/>
      <circle cx="4" cy="-18" r="1.3" class="lego-face"/>
      <path d="M -3 -13 Q 0 -11 3 -13" fill="none" class="lego-face"/>
      <rect x="-17" y="-4" width="7" height="22" rx="3" class="lego-body-g"/>
      <rect x="10" y="-4" width="7" height="22" rx="3" class="lego-body-g"/>
      <circle cx="-13.5" cy="19" r="3.5" class="lego-skin"/>
      <circle cx="13.5" cy="19" r="3.5" class="lego-skin"/>
    </g>
  </defs>

  <!-- backdrop -->
  <rect class="bg" width="960" height="600" rx="14"/>

  <!-- title -->
  <text x="480" y="30" text-anchor="middle" fill="#cdd6f4" font-size="15" font-weight="600">save-my-session · seamless handoff demo</text>

  <!-- =================== LEFT: Claude panel =================== -->
  <g transform="translate(40, 60)">
    <!-- character stage -->
    <rect width="400" height="120" rx="8" fill="#181824"/>
    <!-- ground shadow -->
    <ellipse cx="200" cy="108" rx="50" ry="5" fill="#000" opacity="0.3"/>

    <!-- Claude minifig, centered above terminal, waves during 0-3s -->
    <g transform="translate(200, 54)">
      <!-- whole figure bobbing -->
      <animateTransform attributeName="transform" type="translate" values="200,54; 200,52; 200,54" dur="1.2s" repeatCount="indefinite"/>
      <use href="#lego-claude"/>
      <!-- speech bubble -->
      <g id="claude-bubble-1" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.25;0.3" dur="18s" repeatCount="indefinite"/>
        <rect x="25" y="-34" width="100" height="24" rx="6" fill="#fff"/>
        <polygon points="28,-14 22,-6 38,-14" fill="#fff"/>
        <text x="75" y="-18" text-anchor="middle" fill="#1e1e2e" font-size="11">working on it! ✨</text>
      </g>
      <!-- tired bubble -->
      <g id="claude-bubble-2" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.33;0.42;0.46" dur="18s" repeatCount="indefinite"/>
        <rect x="25" y="-40" width="118" height="30" rx="6" fill="#fff"/>
        <polygon points="28,-14 22,-6 38,-14" fill="#fff"/>
        <text x="84" y="-24" text-anchor="middle" fill="#f38ba8" font-size="11">⚠️ quota almost gone</text>
        <text x="84" y="-14" text-anchor="middle" fill="#1e1e2e" font-size="10">transferring...</text>
      </g>
    </g>

    <!-- terminal panel -->
    <g transform="translate(0, 130)">
      <rect class="panel-c" width="400" height="360" rx="8"/>
      <rect class="bar" width="400" height="22" rx="8"/>
      <rect class="bar" y="14" width="400" height="8"/>
      <circle class="dot-r" cx="14" cy="11" r="4"/>
      <circle class="dot-y" cx="28" cy="11" r="4"/>
      <circle class="dot-g" cx="42" cy="11" r="4"/>
      <text x="200" y="16" text-anchor="middle" class="title-c" font-size="13" font-weight="700">● Claude Code</text>

      <!-- terminal content -->
      <g transform="translate(12, 42)">
        <!-- 0-3s: conversation -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;1;1;1" keyTimes="0;0.03;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="12"><tspan class="prompt">▸</tspan> <tspan class="user-msg">build a parser for session files</tspan></text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.06;0.09;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="34" class="asst-msg">I'll start with a unified schema across all three...</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.13;0.16;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="52" class="asst-msg">✓ parsers.ts   ✓ writers.ts   ✓ finder.ts</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.20;0.24;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="70"><tspan class="prompt">▸</tspan> <tspan class="user-msg">add append mode too</tspan></text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.27;0.30;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="88" class="asst-msg">Dedup by timestamp &gt; target's last message.</text>
        </g>

        <!-- quota banner -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.32;0.34;0.44;0.46;1" dur="18s" repeatCount="indefinite"/>
          <rect x="0" y="104" width="372" height="22" rx="4" fill="#45293a"/>
          <text x="186" y="119" text-anchor="middle" class="err" font-size="11">⚠ Rate limit approaching — consider handoff</text>
        </g>

        <!-- transfer command -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.48;0.51;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="148"><tspan class="prompt">$</tspan> <tspan class="cmd">save-my-session transfer \</tspan></text>
          <text y="164" x="18" class="cmd">  --from claude --to gemini</text>
        </g>

        <!-- transfer output -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.54;0.56;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="186" class="muted">🔄 Claude Code → Gemini CLI</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.58;0.60;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="202" class="muted">📖 42 user / 118 assistant messages</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.62;0.64;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="218" class="muted">✍️  Writing Gemini session...</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.66;0.68;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="240" class="good">✅ Transfer complete!</text>
        </g>
      </g>
    </g>
  </g>

  <!-- =================== RIGHT: Gemini panel =================== -->
  <g transform="translate(520, 60)">
    <!-- character stage -->
    <rect width="400" height="120" rx="8" fill="#181824"/>
    <ellipse cx="200" cy="108" rx="50" ry="5" fill="#000" opacity="0.3"/>

    <!-- Gemini starts sleepy/dim, wakes up after transfer -->
    <g transform="translate(200, 54)">
      <!-- bobbing (slower until woken) -->
      <animateTransform attributeName="transform" type="translate" values="200,56; 200,54; 200,56" dur="1.5s" repeatCount="indefinite"/>
      <!-- dim until ~7s, then full opacity -->
      <g>
        <animate attributeName="opacity" values="0.35;0.35;0.35;1;1;0.35" keyTimes="0;0.48;0.52;0.54;0.98;1" dur="18s" repeatCount="indefinite"/>
        <use href="#lego-gemini"/>
      </g>
      <!-- zzz before transfer -->
      <g>
        <animate attributeName="opacity" values="1;1;1;0;0;1" keyTimes="0;0.48;0.51;0.53;0.98;1" dur="18s" repeatCount="indefinite"/>
        <text x="18" y="-30" fill="#6c7086" font-size="11">z</text>
        <text x="24" y="-36" fill="#6c7086" font-size="9">z</text>
        <text x="30" y="-42" fill="#6c7086" font-size="7">z</text>
      </g>
      <!-- waking bubble -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.55;0.58;0.60;0.75;0.78" dur="18s" repeatCount="indefinite"/>
        <rect x="20" y="-34" width="116" height="24" rx="6" fill="#fff"/>
        <polygon points="28,-14 22,-6 38,-14" fill="#fff"/>
        <text x="78" y="-18" text-anchor="middle" fill="#1e1e2e" font-size="11">loading history... ⚡</text>
      </g>
      <!-- continuing bubble -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.78;0.80;0.82;0.85;0.98;1" dur="18s" repeatCount="indefinite"/>
        <rect x="20" y="-34" width="124" height="24" rx="6" fill="#fff"/>
        <polygon points="28,-14 22,-6 38,-14" fill="#fff"/>
        <text x="82" y="-18" text-anchor="middle" fill="#a6e3a1" font-size="11">got it — let's continue!</text>
      </g>
    </g>

    <!-- terminal panel (starts dim, lights up after transfer) -->
    <g transform="translate(0, 130)">
      <rect class="panel-g" width="400" height="360" rx="8" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.4;0.4;1;1;0.4" keyTimes="0;0.52;0.54;0.56;0.98;1" dur="18s" repeatCount="indefinite"/>
      </rect>
      <rect class="bar" width="400" height="22" rx="8"/>
      <rect class="bar" y="14" width="400" height="8"/>
      <circle class="dot-r" cx="14" cy="11" r="4"/>
      <circle class="dot-y" cx="28" cy="11" r="4"/>
      <circle class="dot-g" cx="42" cy="11" r="4"/>
      <text x="200" y="16" text-anchor="middle" class="title-g" font-size="13" font-weight="700">● Gemini CLI</text>

      <g transform="translate(12, 42)">
        <!-- idle dim -->
        <g opacity="0.4">
          <animate attributeName="opacity" values="0.4;0.4;0.4;0;0;0.4" keyTimes="0;0.54;0.56;0.58;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="12" class="muted">(waiting for something to do...)</text>
        </g>

        <!-- user opens gemini and /resume -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.60;0.62;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="12"><tspan class="prompt">$</tspan> <tspan class="cmd">gemini</tspan></text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.64;0.66;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="34"><tspan class="prompt">&gt;</tspan> <tspan class="warn">/resume</tspan></text>
        </g>

        <!-- session picker -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.68;0.70;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="56" class="muted">Select a session to resume:</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.70;0.72;0.98;1" dur="18s" repeatCount="indefinite"/>
          <rect x="0" y="64" width="372" height="18" rx="3" fill="#313244"/>
          <text y="76" x="6" class="good">▸ session-2026-04-18... (just now · 160 msgs)</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.72;0.74;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="98" x="6" class="muted">  session-2026-04-17...</text>
        </g>

        <!-- loaded session -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.78;0.80;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="130" class="good">✓ Loaded 160 messages from Claude session</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.82;0.84;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="150" class="asst-msg">I see — we were building the append-mode. Tests passing?</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.86;0.88;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="172"><tspan class="prompt">▸</tspan> <tspan class="user-msg">yeah all 24 green. next: refactor writers</tspan></text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.90;0.92;0.98;1" dur="18s" repeatCount="indefinite"/>
          <text y="194" class="asst-msg">Got it, continuing from where Claude left off. 🚀</text>
        </g>
      </g>
    </g>
  </g>

  <!-- =================== Flow packets between panels =================== -->
  <!-- three packets flying from Claude (right edge ~440) to Gemini (left edge ~520) through the center -->
  <g>
    <!-- packet 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.48;0.50;0.54;0.55;1" dur="18s" repeatCount="indefinite"/>
      <rect x="-10" y="-8" width="20" height="16" rx="2" class="packet">
        <animateTransform attributeName="transform" type="translate"
          values="440,310; 520,310"
          keyTimes="0;1"
          begin="0s" dur="18s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- packet 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.50;0.52;0.55;0.57;1" dur="18s" repeatCount="indefinite"/>
      <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#a6e3a1">
        <animateTransform attributeName="transform" type="translate"
          values="440,320; 520,300"
          keyTimes="0;1"
          begin="0s" dur="18s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- packet 3 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.52;0.54;0.56;0.58;1" dur="18s" repeatCount="indefinite"/>
      <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#89b4fa">
        <animateTransform attributeName="transform" type="translate"
          values="440,300; 520,320"
          keyTimes="0;1"
          begin="0s" dur="18s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- center arrow label during transfer -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.48;0.50;0.56;0.58;1" dur="18s" repeatCount="indefinite"/>
    <text x="480" y="265" text-anchor="middle" fill="#f5c2e7" font-size="10">session.jsonl →</text>
  </g>

  <!-- footer caption -->
  <text x="480" y="575" text-anchor="middle" fill="#6c7086" font-size="11">
    1. Claude hits quota  →  2. <tspan fill="#cdd6f4">save-my-session transfer</tspan>  →  3. Gemini <tspan fill="#f9e2af">/resume</tspan>  →  4. Keep coding 🚀
  </text>
</svg>
