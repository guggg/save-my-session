<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="SFMono-Regular, Menlo, monospace" font-size="12">
  <defs>
    <style>
      .bg { fill: #0f0f1a; }
      .panel { fill: #1e1e2e; stroke: #D97757; stroke-width: 2; }
      .title { fill: #D97757; }
      .bar { fill: #313244; }
      .dot-r { fill: #f38ba8; }
      .dot-y { fill: #f9e2af; }
      .dot-g { fill: #a6e3a1; }
      .prompt { fill: #89b4fa; }
      .cmd { fill: #cdd6f4; }
      .muted { fill: #6c7086; }
      .good { fill: #a6e3a1; }
      .warn { fill: #f9e2af; }
      .hl { fill: #f5c2e7; }

      .lego-skin { fill: #F4D8C8; }
      .lego-hair { fill: #4A3728; }
      .lego-body { fill: #D97757; }
      .lego-legs { fill: #3F3F56; }
      .lego-face { fill: #2D1B17; stroke: #2D1B17; stroke-width: 1.2; stroke-linecap: round; }
      .lego-stud { fill-opacity: 0.35; fill: #000; }
    </style>

    <g id="lego-claude">
      <rect x="-11" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="1" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="-12" y="26" width="24" height="6" rx="1" class="lego-legs"/>
      <path d="M -10 -6 L 10 -6 L 13 26 L -13 26 Z" class="lego-body"/>
      <rect x="-3" y="-10" width="6" height="4" class="lego-skin"/>
      <rect x="-9" y="-28" width="18" height="20" rx="4" class="lego-skin"/>
      <ellipse cx="0" cy="-29" rx="4" ry="1.5" class="lego-stud"/>
      <path d="M -10 -22 Q 0 -32 10 -22 L 10 -27 Q 0 -34 -10 -27 Z" class="lego-hair"/>
      <circle cx="-4" cy="-18" r="1.3" class="lego-face"/>
      <circle cx="4" cy="-18" r="1.3" class="lego-face"/>
      <path d="M -3 -13 Q 0 -11 3 -13" fill="none" class="lego-face"/>
      <rect x="-17" y="-4" width="7" height="22" rx="3" class="lego-body"/>
      <rect x="10" y="-4" width="7" height="22" rx="3" class="lego-body"/>
      <circle cx="-13.5" cy="19" r="3.5" class="lego-skin"/>
      <circle cx="13.5" cy="19" r="3.5" class="lego-skin"/>
    </g>
  </defs>

  <rect class="bg" width="760" height="520" rx="14"/>
  <text x="380" y="28" text-anchor="middle" fill="#cdd6f4" font-size="14" font-weight="600">
    save-my-session · <tspan class="hl">list</tspan> 示範
  </text>

  <!-- lego stage -->
  <rect x="40" y="48" width="680" height="90" rx="8" fill="#181824"/>
  <ellipse cx="120" cy="128" rx="30" ry="4" fill="#000" opacity="0.3"/>
  <g transform="translate(120, 80)">
    <animateTransform attributeName="transform" type="translate" values="120,80;120,78;120,80" dur="1.3s" repeatCount="indefinite"/>
    <use href="#lego-claude"/>
  </g>
  <!-- speech bubble: looking for past sessions -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.4;0.45" dur="20s" repeatCount="indefinite"/>
    <rect x="180" y="55" width="210" height="36" rx="8" fill="#fff"/>
    <polygon points="180,80 172,90 195,82" fill="#fff"/>
    <text x="285" y="78" text-anchor="middle" fill="#1e1e2e" font-size="12">剛剛那個 session 是哪一個？</text>
  </g>
  <!-- speech bubble: found it -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.55;0.95;1" dur="20s" repeatCount="indefinite"/>
    <rect x="180" y="55" width="230" height="36" rx="8" fill="#fff"/>
    <polygon points="180,80 172,90 195,82" fill="#fff"/>
    <text x="295" y="78" text-anchor="middle" fill="#a6e3a1" font-size="12">找到了，就是 #1！ 🎯</text>
  </g>

  <!-- terminal -->
  <g transform="translate(40, 150)">
    <rect class="panel" width="680" height="350" rx="8"/>
    <rect class="bar" width="680" height="24" rx="8"/>
    <rect class="bar" y="16" width="680" height="8"/>
    <circle class="dot-r" cx="16" cy="12" r="4.5"/>
    <circle class="dot-y" cx="32" cy="12" r="4.5"/>
    <circle class="dot-g" cx="48" cy="12" r="4.5"/>
    <text x="340" y="17" text-anchor="middle" class="title" font-size="13" font-weight="700">● Claude Code</text>

    <g transform="translate(16, 48)">
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;1;1" keyTimes="0;0.04;0.98;1" dur="20s" repeatCount="indefinite"/>
        <text y="14"><tspan class="prompt">$</tspan> <tspan class="cmd">save-my-session list --from claude</tspan></text>
      </g>

      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.12;0.15;0.98;1" dur="20s" repeatCount="indefinite"/>
        <text y="42" class="muted">📋 Claude Code sessions for: /Users/you/projects/save-my-session</text>
      </g>

      <!-- Session #1 (latest) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.20;0.24;0.98;1" dur="20s" repeatCount="indefinite"/>
        <text y="72"><tspan class="cmd" font-weight="700">#1</tspan> <tspan class="good">(最新)</tspan></text>
        <text y="90" x="20" class="cmd">"修好 append 去重的 bug 並重構 writers"</text>
        <text y="108" x="20" class="muted">42 user / 118 assistant 訊息</text>
        <text y="126" x="20" class="muted">4/18 10:24 → 4/18 14:52</text>
        <text y="144" x="20" class="muted" font-size="11">/Users/you/.claude/projects/-Users-you.../a1b2c3.jsonl</text>
      </g>

      <!-- Session #2 -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.40;0.44;0.98;1" dur="20s" repeatCount="indefinite"/>
        <text y="172"><tspan class="cmd" font-weight="700">#2</tspan></text>
        <text y="190" x="20" class="cmd">"最初的 MVP 設計"</text>
        <text y="208" x="20" class="muted">6 user / 3 assistant 訊息</text>
        <text y="226" x="20" class="muted">4/16 10:51 → 4/16 11:30</text>
        <text y="244" x="20" class="muted" font-size="11">/Users/you/.claude/projects/-Users-you.../d4e5f6.jsonl</text>
      </g>

      <!-- hint -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.60;0.64;0.98;1" dur="20s" repeatCount="indefinite"/>
        <text y="274" class="muted">用 --session &lt;path&gt; 轉移特定的 session：</text>
        <text y="292" class="muted">save-my-session transfer --from claude --to &lt;target&gt; --session &lt;path&gt;</text>
      </g>

      <!-- cursor -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.80;0.82;0.98;1" dur="20s" repeatCount="indefinite"/>
        <text y="290" class="prompt">$</text>
        <rect x="14" y="278" width="8" height="14" fill="#cdd6f4">
          <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
  </g>
</svg>
