<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="SFMono-Regular, Menlo, monospace" font-size="12">
  <defs>
    <style>
      .bg { fill: #0f0f1a; }
      .panel-c { fill: #1e1e2e; stroke: #D97757; stroke-width: 2; }
      .panel-g { fill: #1e1e2e; stroke: #5A8DF4; stroke-width: 2; }
      .title-c { fill: #D97757; }
      .title-g { fill: #5A8DF4; }
      .bar { fill: #313244; }
      .dot-r { fill: #f38ba8; }
      .dot-y { fill: #f9e2af; }
      .dot-g { fill: #a6e3a1; }
      .prompt { fill: #89b4fa; }
      .cmd { fill: #cdd6f4; }
      .muted { fill: #6c7086; }
      .good { fill: #a6e3a1; }
      .warn { fill: #f9e2af; }
      .user-msg { fill: #b4befe; }
      .asst-msg { fill: #cdd6f4; }
      .hl { fill: #f5c2e7; }

      .lego-skin { fill: #F4D8C8; }
      .lego-hair-c { fill: #4A3728; }
      .lego-hair-g { fill: #2A3A5A; }
      .lego-body-c { fill: #D97757; }
      .lego-body-g { fill: #5A8DF4; }
      .lego-legs { fill: #3F3F56; }
      .lego-face { fill: #2D1B17; stroke: #2D1B17; stroke-width: 1.2; stroke-linecap: round; }
      .lego-stud { fill-opacity: 0.35; fill: #000; }
      .packet { fill: #f9e2af; }
    </style>

    <g id="lego-claude">
      <rect x="-11" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="1" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="-12" y="26" width="24" height="6" rx="1" class="lego-legs"/>
      <path d="M -10 -6 L 10 -6 L 13 26 L -13 26 Z" class="lego-body-c"/>
      <rect x="-3" y="-10" width="6" height="4" class="lego-skin"/>
      <rect x="-9" y="-28" width="18" height="20" rx="4" class="lego-skin"/>
      <ellipse cx="0" cy="-29" rx="4" ry="1.5" class="lego-stud"/>
      <path d="M -10 -22 Q 0 -32 10 -22 L 10 -27 Q 0 -34 -10 -27 Z" class="lego-hair-c"/>
      <circle cx="-4" cy="-18" r="1.3" class="lego-face"/>
      <circle cx="4" cy="-18" r="1.3" class="lego-face"/>
      <path d="M -3 -13 Q 0 -11 3 -13" fill="none" class="lego-face"/>
      <rect x="-17" y="-4" width="7" height="22" rx="3" class="lego-body-c"/>
      <rect x="10" y="-4" width="7" height="22" rx="3" class="lego-body-c"/>
      <circle cx="-13.5" cy="19" r="3.5" class="lego-skin"/>
      <circle cx="13.5" cy="19" r="3.5" class="lego-skin"/>
    </g>

    <g id="lego-gemini">
      <rect x="-11" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="1" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="-12" y="26" width="24" height="6" rx="1" class="lego-legs"/>
      <path d="M -10 -6 L 10 -6 L 13 26 L -13 26 Z" class="lego-body-g"/>
      <rect x="-3" y="-10" width="6" height="4" class="lego-skin"/>
      <rect x="-9" y="-28" width="18" height="20" rx="4" class="lego-skin"/>
      <ellipse cx="0" cy="-29" rx="4" ry="1.5" class="lego-stud"/>
      <path d="M -10 -22 Q 0 -30 10 -22 L 10 -27 Q 0 -33 -10 -27 Z" class="lego-hair-g"/>
      <line x1="0" y1="-28" x2="0" y2="-34" stroke="#5A8DF4" stroke-width="1.5"/>
      <circle cx="0" cy="-35" r="2" fill="#f9e2af"/>
      <circle cx="-4" cy="-18" r="1.3" class="lego-face"/>
      <circle cx="4" cy="-18" r="1.3" class="lego-face"/>
      <path d="M -3 -13 Q 0 -11 3 -13" fill="none" class="lego-face"/>
      <rect x="-17" y="-4" width="7" height="22" rx="3" class="lego-body-g"/>
      <rect x="10" y="-4" width="7" height="22" rx="3" class="lego-body-g"/>
      <circle cx="-13.5" cy="19" r="3.5" class="lego-skin"/>
      <circle cx="13.5" cy="19" r="3.5" class="lego-skin"/>
    </g>
  </defs>

  <rect class="bg" width="960" height="600" rx="14"/>
  <text x="480" y="28" text-anchor="middle" fill="#cdd6f4" font-size="14" font-weight="600">
    save-my-session · <tspan class="hl">append</tspan> 來回交接示範
  </text>
  <text x="480" y="48" text-anchor="middle" fill="#6c7086" font-size="11">
    Claude session → Gemini → 把新進度 <tspan class="hl">append back</tspan> 回 Claude 原本的 session
  </text>

  <!-- LEFT: Claude -->
  <g transform="translate(40, 70)">
    <rect width="400" height="110" rx="8" fill="#181824"/>
    <ellipse cx="200" cy="98" rx="50" ry="5" fill="#000" opacity="0.3"/>
    <g transform="translate(200, 50)">
      <animateTransform attributeName="transform" type="translate" values="200,50;200,48;200,50" dur="1.3s" repeatCount="indefinite"/>
      <use href="#lego-claude"/>
    </g>
    <!-- speech: "take over for a bit" -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.18;0.22" dur="22s" repeatCount="indefinite"/>
      <rect x="25" y="15" width="150" height="22" rx="6" fill="#fff"/>
      <polygon points="28,32 22,40 38,32" fill="#fff"/>
      <text x="100" y="30" text-anchor="middle" fill="#1e1e2e" font-size="11">你先接手一下？</text>
    </g>
    <!-- speech: "welcome back!" -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.68;0.72;0.92;1" dur="22s" repeatCount="indefinite"/>
      <rect x="25" y="15" width="150" height="22" rx="6" fill="#fff"/>
      <polygon points="28,32 22,40 38,32" fill="#fff"/>
      <text x="100" y="30" text-anchor="middle" fill="#a6e3a1" font-size="11">歡迎回來！ ✨</text>
    </g>

    <g transform="translate(0, 120)">
      <rect class="panel-c" width="400" height="380" rx="8"/>
      <rect class="bar" width="400" height="22" rx="8"/>
      <rect class="bar" y="14" width="400" height="8"/>
      <circle class="dot-r" cx="14" cy="11" r="4"/>
      <circle class="dot-y" cx="28" cy="11" r="4"/>
      <circle class="dot-g" cx="42" cy="11" r="4"/>
      <text x="200" y="16" text-anchor="middle" class="title-c" font-size="13" font-weight="700">● Claude Code</text>

      <g transform="translate(12, 42)">
        <!-- original conversation -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;1;1;1" keyTimes="0;0.04;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="12"><tspan class="prompt">▸</tspan> <tspan class="user-msg">開始做 parser 模組</tspan></text>
          <text y="30" class="asst-msg">✓ parsers.ts 完成，測試都過。</text>
        </g>

        <!-- handoff -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.14;0.18;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="58" class="muted">💤 （交接給 Gemini — 待機中）</text>
        </g>

        <!-- append arriving -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.56;0.58;0.66;0.70;1" dur="22s" repeatCount="indefinite"/>
          <rect x="0" y="72" width="372" height="20" rx="4" fill="#2d3a2d"/>
          <text x="186" y="86" text-anchor="middle" class="good" font-size="11">⬇ 收到：Gemini 傳來 12 則新訊息</text>
        </g>

        <!-- appended messages shown -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.70;0.74;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="110" class="muted">── 從 Gemini append ──</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.74;0.76;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="132"><tspan class="prompt">▸</tspan> <tspan class="user-msg">加上 writer 模組</tspan></text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.78;0.80;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="150" class="asst-msg">✓ writers.ts 完成（Gemini）</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.82;0.84;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="168"><tspan class="prompt">▸</tspan> <tspan class="user-msg">接著串 append 邏輯</tspan></text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.86;0.88;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="186" class="asst-msg">✓ 用 timestamp 去重，測試通過</text>
        </g>

        <!-- resume in claude -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.90;0.92;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="216"><tspan class="prompt">$</tspan> <tspan class="cmd">claude</tspan> <tspan class="muted">→</tspan> <tspan class="warn">/resume</tspan></text>
          <text y="236" class="good">✓ 完整歷史回來了，Claude 接著 Gemini 的進度繼續。</text>
        </g>
      </g>
    </g>
  </g>

  <!-- RIGHT: Gemini -->
  <g transform="translate(520, 70)">
    <rect width="400" height="110" rx="8" fill="#181824"/>
    <ellipse cx="200" cy="98" rx="50" ry="5" fill="#000" opacity="0.3"/>
    <g transform="translate(200, 50)">
      <animateTransform attributeName="transform" type="translate" values="200,50;200,48;200,50" dur="1.3s" repeatCount="indefinite"/>
      <use href="#lego-gemini"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.24;0.5;0.54" dur="22s" repeatCount="indefinite"/>
      <rect x="25" y="15" width="160" height="22" rx="6" fill="#fff"/>
      <polygon points="28,32 22,40 38,32" fill="#fff"/>
      <text x="105" y="30" text-anchor="middle" fill="#1e1e2e" font-size="11">接手囉，寫 writers 中...</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.52;0.55;0.65;0.67" dur="22s" repeatCount="indefinite"/>
      <rect x="25" y="15" width="170" height="22" rx="6" fill="#fff"/>
      <polygon points="28,32 22,40 38,32" fill="#fff"/>
      <text x="110" y="30" text-anchor="middle" fill="#f5c2e7" font-size="11">把進度回傳給你 ↗</text>
    </g>

    <g transform="translate(0, 120)">
      <rect class="panel-g" width="400" height="380" rx="8"/>
      <rect class="bar" width="400" height="22" rx="8"/>
      <rect class="bar" y="14" width="400" height="8"/>
      <circle class="dot-r" cx="14" cy="11" r="4"/>
      <circle class="dot-y" cx="28" cy="11" r="4"/>
      <circle class="dot-g" cx="42" cy="11" r="4"/>
      <text x="200" y="16" text-anchor="middle" class="title-g" font-size="13" font-weight="700">● Gemini CLI</text>

      <g transform="translate(12, 42)">
        <!-- received from claude -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.20;0.24;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="12" class="good">✓ 已接續 Claude 的 session（1 user / 1 assistant）</text>
        </g>
        <!-- continuing work -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.28;0.30;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="38"><tspan class="prompt">▸</tspan> <tspan class="user-msg">加上 writer 模組</tspan></text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.32;0.34;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="56" class="asst-msg">✓ writers.ts 完成</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.36;0.38;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="74"><tspan class="prompt">▸</tspan> <tspan class="user-msg">接著串 append 邏輯</tspan></text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.40;0.42;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="92" class="asst-msg">✓ 用 timestamp 去重，測試通過</text>
        </g>

        <!-- time to go back -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.44;0.46;0.54;0.58" dur="22s" repeatCount="indefinite"/>
          <rect x="0" y="106" width="372" height="22" rx="4" fill="#45293a"/>
          <text x="186" y="121" text-anchor="middle" class="warn" font-size="11">⚠ Gemini 額度快到頂了</text>
        </g>

        <!-- append command -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.56;0.58;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="150"><tspan class="prompt">$</tspan> <tspan class="cmd">save-my-session append \</tspan></text>
          <text y="168" x="16" class="cmd">  --from gemini --to claude \</text>
          <text y="186" x="16" class="cmd">  --target a1b2c3d</text>
        </g>

        <!-- output -->
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.62;0.64;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="214" class="muted">📎 append 到既有的 Claude Code session...</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.66;0.68;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="232" class="good">✅ 成功 append 12 則新訊息</text>
        </g>
        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.70;0.72;0.98;1" dur="22s" repeatCount="indefinite"/>
          <text y="250" class="muted">（只取 timestamp &gt; 目標最後一則的訊息）</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Flow: outbound packets at ~4s (L→R) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.18;0.20;0.24;0.26;1" dur="22s" repeatCount="indefinite"/>
    <rect x="-10" y="-8" width="20" height="16" rx="2" class="packet">
      <animateTransform attributeName="transform" type="translate" values="440,330; 520,330" dur="22s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.20;0.22;0.25;0.27;1" dur="22s" repeatCount="indefinite"/>
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#a6e3a1">
      <animateTransform attributeName="transform" type="translate" values="440,340; 520,320" dur="22s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Flow: return packets at ~12s (R→L) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.62;0.64;0.68;0.70;1" dur="22s" repeatCount="indefinite"/>
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#f5c2e7">
      <animateTransform attributeName="transform" type="translate" values="520,330; 440,330" dur="22s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.64;0.66;0.70;0.72;1" dur="22s" repeatCount="indefinite"/>
    <rect x="-10" y="-8" width="20" height="16" rx="2" fill="#89b4fa">
      <animateTransform attributeName="transform" type="translate" values="520,340; 440,320" dur="22s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="480" y="580" text-anchor="middle" fill="#6c7086" font-size="11">
    <tspan class="hl">append</tspan> 用內容去重，只把新訊息合進目標 session，不會重複。
  </text>
</svg>
