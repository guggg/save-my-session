<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="SFMono-Regular, Menlo, monospace" font-size="12">
  <defs>
    <style>
      .bg { fill: #0f0f1a; }
      .panel { fill: #1e1e2e; stroke: #a6e3a1; stroke-width: 2; }
      .title { fill: #a6e3a1; }
      .bar { fill: #313244; }
      .dot-r { fill: #f38ba8; }
      .dot-y { fill: #f9e2af; }
      .dot-g { fill: #a6e3a1; }
      .prompt { fill: #89b4fa; }
      .cmd { fill: #cdd6f4; }
      .muted { fill: #6c7086; }
      .good { fill: #a6e3a1; }
      .hl { fill: #f5c2e7; }

      .lego-skin { fill: #F4D8C8; }
      .lego-legs { fill: #3F3F56; }
      .lego-face { fill: #2D1B17; stroke: #2D1B17; stroke-width: 1.2; stroke-linecap: round; }
      .lego-stud { fill-opacity: 0.35; fill: #000; }

      .card { fill: #181824; stroke: #313244; stroke-width: 1; }
    </style>

    <!-- generic minifig factory with custom body color -->
    <g id="lego-c" transform="scale(0.85)">
      <rect x="-11" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="1" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="-12" y="26" width="24" height="6" rx="1" class="lego-legs"/>
      <path d="M -10 -6 L 10 -6 L 13 26 L -13 26 Z" fill="#D97757"/>
      <rect x="-3" y="-10" width="6" height="4" class="lego-skin"/>
      <rect x="-9" y="-28" width="18" height="20" rx="4" class="lego-skin"/>
      <ellipse cx="0" cy="-29" rx="4" ry="1.5" class="lego-stud"/>
      <path d="M -10 -22 Q 0 -32 10 -22 L 10 -27 Q 0 -34 -10 -27 Z" fill="#4A3728"/>
      <circle cx="-4" cy="-18" r="1.3" class="lego-face"/>
      <circle cx="4" cy="-18" r="1.3" class="lego-face"/>
      <path d="M -3 -13 Q 0 -11 3 -13" fill="none" class="lego-face"/>
      <rect x="-17" y="-4" width="7" height="22" rx="3" fill="#D97757"/>
      <rect x="10" y="-4" width="7" height="22" rx="3" fill="#D97757"/>
      <circle cx="-13.5" cy="19" r="3.5" class="lego-skin"/>
      <circle cx="13.5" cy="19" r="3.5" class="lego-skin"/>
    </g>
    <g id="lego-g" transform="scale(0.85)">
      <rect x="-11" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="1" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="-12" y="26" width="24" height="6" rx="1" class="lego-legs"/>
      <path d="M -10 -6 L 10 -6 L 13 26 L -13 26 Z" fill="#5A8DF4"/>
      <rect x="-3" y="-10" width="6" height="4" class="lego-skin"/>
      <rect x="-9" y="-28" width="18" height="20" rx="4" class="lego-skin"/>
      <ellipse cx="0" cy="-29" rx="4" ry="1.5" class="lego-stud"/>
      <path d="M -10 -22 Q 0 -30 10 -22 L 10 -27 Q 0 -33 -10 -27 Z" fill="#2A3A5A"/>
      <line x1="0" y1="-28" x2="0" y2="-34" stroke="#5A8DF4" stroke-width="1.5"/>
      <circle cx="0" cy="-35" r="2" fill="#f9e2af"/>
      <circle cx="-4" cy="-18" r="1.3" class="lego-face"/>
      <circle cx="4" cy="-18" r="1.3" class="lego-face"/>
      <path d="M -3 -13 Q 0 -11 3 -13" fill="none" class="lego-face"/>
      <rect x="-17" y="-4" width="7" height="22" rx="3" fill="#5A8DF4"/>
      <rect x="10" y="-4" width="7" height="22" rx="3" fill="#5A8DF4"/>
      <circle cx="-13.5" cy="19" r="3.5" class="lego-skin"/>
      <circle cx="13.5" cy="19" r="3.5" class="lego-skin"/>
    </g>
    <g id="lego-x" transform="scale(0.85)">
      <rect x="-11" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="1" y="30" width="10" height="22" rx="2" class="lego-legs"/>
      <rect x="-12" y="26" width="24" height="6" rx="1" class="lego-legs"/>
      <path d="M -10 -6 L 10 -6 L 13 26 L -13 26 Z" fill="#9B59B6"/>
      <rect x="-3" y="-10" width="6" height="4" class="lego-skin"/>
      <rect x="-9" y="-28" width="18" height="20" rx="4" class="lego-skin"/>
      <ellipse cx="0" cy="-29" rx="4" ry="1.5" class="lego-stud"/>
      <path d="M -10 -22 Q 0 -28 10 -22 L 10 -27 Q 0 -32 -10 -27 Z" fill="#1a1a1a"/>
      <circle cx="-4" cy="-18" r="1.3" class="lego-face"/>
      <circle cx="4" cy="-18" r="1.3" class="lego-face"/>
      <path d="M -3 -13 Q 0 -11 3 -13" fill="none" class="lego-face"/>
      <rect x="-17" y="-4" width="7" height="22" rx="3" fill="#9B59B6"/>
      <rect x="10" y="-4" width="7" height="22" rx="3" fill="#9B59B6"/>
      <circle cx="-13.5" cy="19" r="3.5" class="lego-skin"/>
      <circle cx="13.5" cy="19" r="3.5" class="lego-skin"/>
    </g>
  </defs>

  <rect class="bg" width="820" height="520" rx="14"/>
  <text x="410" y="28" text-anchor="middle" fill="#cdd6f4" font-size="14" font-weight="600">
    save-my-session · <tspan class="hl">install</tspan> demo
  </text>
  <text x="410" y="48" text-anchor="middle" fill="#6c7086" font-size="11">
    injects a handoff prompt into each agent's global system prompt file
  </text>

  <!-- terminal -->
  <g transform="translate(40, 66)">
    <rect class="panel" width="740" height="180" rx="8"/>
    <rect class="bar" width="740" height="22" rx="8"/>
    <rect class="bar" y="14" width="740" height="8"/>
    <circle class="dot-r" cx="14" cy="11" r="4"/>
    <circle class="dot-y" cx="28" cy="11" r="4"/>
    <circle class="dot-g" cx="42" cy="11" r="4"/>
    <text x="370" y="16" text-anchor="middle" class="title" font-size="13" font-weight="700">● Terminal</text>

    <g transform="translate(14, 44)">
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;1;1" keyTimes="0;0.04;0.98;1" dur="18s" repeatCount="indefinite"/>
        <text y="14"><tspan class="prompt">$</tspan> <tspan class="cmd">save-my-session install</tspan></text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.14;0.17;0.98;1" dur="18s" repeatCount="indefinite"/>
        <text y="40" class="muted">🔧 Installing save-my-session handoff prompts...</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.28;0.31;0.98;1" dur="18s" repeatCount="indefinite"/>
        <text y="62" class="good">  ✅ Claude Code: Injected into ~/.claude/CLAUDE.md</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.42;0.45;0.98;1" dur="18s" repeatCount="indefinite"/>
        <text y="82" class="good">  ✅ Gemini CLI: Injected into ~/.gemini/GEMINI.md</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.56;0.59;0.98;1" dur="18s" repeatCount="indefinite"/>
        <text y="102" class="good">  ✅ Codex: Injected into ~/.codex/AGENTS.md</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.66;0.69;0.98;1" dur="18s" repeatCount="indefinite"/>
        <text y="130" class="cmd">✨ Done! 3 agent(s) configured.</text>
      </g>
    </g>
  </g>

  <!-- three agents cards -->
  <g transform="translate(40, 270)">
    <text y="0" fill="#cdd6f4" font-size="12" font-weight="600">Each agent now knows about handoff:</text>

    <!-- Claude card -->
    <g transform="translate(0, 20)">
      <rect class="card" width="240" height="210" rx="8"/>
      <g transform="translate(50, 60)">
        <use href="#lego-c"/>
      </g>
      <text x="120" y="14" text-anchor="middle" fill="#D97757" font-size="13" font-weight="700">Claude Code</text>

      <!-- speech bubble next to minifig, showing content appended to md -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.28;0.34;0.98;1" dur="18s" repeatCount="indefinite"/>
        <rect x="100" y="38" width="130" height="58" rx="6" fill="#fff"/>
        <polygon points="100,60 90,68 108,64" fill="#fff"/>
        <text x="110" y="55" fill="#1e1e2e" font-size="9" font-weight="600">~/.claude/CLAUDE.md</text>
        <text x="110" y="72" fill="#1e1e2e" font-size="9">+ handoff instructions</text>
        <text x="110" y="85" fill="#a6e3a1" font-size="9">watches quota</text>
      </g>
    </g>

    <!-- Gemini card -->
    <g transform="translate(250, 20)">
      <rect class="card" width="240" height="210" rx="8"/>
      <g transform="translate(50, 60)">
        <use href="#lego-g"/>
      </g>
      <text x="120" y="14" text-anchor="middle" fill="#5A8DF4" font-size="13" font-weight="700">Gemini CLI</text>

      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.42;0.48;0.98;1" dur="18s" repeatCount="indefinite"/>
        <rect x="100" y="38" width="130" height="58" rx="6" fill="#fff"/>
        <polygon points="100,60 90,68 108,64" fill="#fff"/>
        <text x="110" y="55" fill="#1e1e2e" font-size="9" font-weight="600">~/.gemini/GEMINI.md</text>
        <text x="110" y="72" fill="#1e1e2e" font-size="9">+ handoff instructions</text>
        <text x="110" y="85" fill="#a6e3a1" font-size="9">watches quota</text>
      </g>
    </g>

    <!-- Codex card -->
    <g transform="translate(500, 20)">
      <rect class="card" width="240" height="210" rx="8"/>
      <g transform="translate(50, 60)">
        <use href="#lego-x"/>
      </g>
      <text x="120" y="14" text-anchor="middle" fill="#9B59B6" font-size="13" font-weight="700">Codex</text>

      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.56;0.62;0.98;1" dur="18s" repeatCount="indefinite"/>
        <rect x="100" y="38" width="130" height="58" rx="6" fill="#fff"/>
        <polygon points="100,60 90,68 108,64" fill="#fff"/>
        <text x="110" y="55" fill="#1e1e2e" font-size="9" font-weight="600">~/.codex/AGENTS.md</text>
        <text x="110" y="72" fill="#1e1e2e" font-size="9">+ handoff instructions</text>
        <text x="110" y="85" fill="#a6e3a1" font-size="9">watches quota</text>
      </g>
    </g>
  </g>

  <text x="410" y="505" text-anchor="middle" fill="#6c7086" font-size="11">
    Idempotent — run again to update. Use <tspan class="hl">save-my-session uninstall</tspan> to remove cleanly.
  </text>
</svg>
